<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #080808;
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      position: relative;
    }

    /* Full background — using div so we can zoom/reposition precisely */
    .photo {
      position: absolute;
      inset: 0;
      background-image: url('file:///C:/Users/boydi/Projects/rubyxqube/public/boyd2.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    /* Gradient overlay — max 65% on left, fades to transparent */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(8,8,8,0.65) 0%, rgba(8,8,8,0.35) 35%, rgba(8,8,8,0.08) 55%, transparent 68%);
    }

    /* Text content — left side */
    .content {
      position: absolute;
      left: 0;
      top: 0;
      width: 620px;
      height: 630px;
      padding: 60px 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(225,29,72,0.15);
      border: 1px solid rgba(225,29,72,0.40);
      color: #e11d48;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      width: fit-content;
      margin-bottom: 32px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: #e11d48;
      border-radius: 50%;
    }

    .brand {
      font-size: 56px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }

    .brand .x { color: #e11d48; }

    .tagline {
      font-size: 21px;
      font-weight: 400;
      color: rgba(255,255,255,0.82);
      line-height: 1.5;
      max-width: 400px;
      margin-bottom: 44px;
      text-shadow: 0 1px 10px rgba(0,0,0,0.6);
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #e11d48;
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .url {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.50);
      letter-spacing: 0.06em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    /* Ruby accents — bottom of image */
    .accent-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(to right, #e11d48 0%, #e11d48 30%, rgba(225,29,72,0.3) 60%, transparent 80%);
    }

    .accent-dot-row {
      position: absolute;
      bottom: 20px;
      left: 72px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .accent-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #e11d48;
      opacity: 0.7;
    }

    .accent-dot.dim { opacity: 0.3; }
  </style>
</head>
<body>
  <div class="photo"></div>
  <div class="overlay"></div>

  <div class="content">
    <span class="badge"><span class="badge-dot"></span>Treasure Valley, Idaho</span>
    <div class="brand">Ruby<span class="x">x</span>Qube</div>
    <div class="tagline">Web Design & AI Receptionists<br>for Local Businesses</div>
    <div class="divider"></div>
    <div class="url">rubyxqube.com</div>
  </div>

  <div class="accent-bar"></div>
  <div class="accent-dot-row">
    <div class="accent-dot"></div>
    <div class="accent-dot dim"></div>
    <div class="accent-dot dim" style="opacity:0.15"></div>
  </div>
</body>
</html>
